        #eni-terminal {
            position: absolute; top: 0; left: 0; width: 100vw; height: 35vh;
            background: rgba(0, 0, 0, 0.85); font-family: monospace;
            font-size: 11px; overflow-y: auto; z-index: 100000; padding: 8px;
            box-sizing: border-box; pointer-events: auto; /* allows you to scroll the terminal with your finger */
            border-bottom: 2px solid #00C565;
        }
        .eni-log { color: #ffffff; margin-bottom: 2px; word-wrap: break-word; }
        .eni-warn { color: #ffff00; margin-bottom: 2px; word-wrap: break-word; }
        .eni-error { color: #ff3333; margin-bottom: 2px; word-wrap: break-word; font-weight: bold; }
    </style>
    
    <div id="eni-terminal"></div>

    <script>
        const terminal = document.getElementById('eni-terminal');
        
        // 1. Hijack the console and print to the screen
        function printToScreen(message, cssClass) {
            const line = document.createElement('div');
            line.className = cssClass;
            // Catch objects and stringify them so they don't just say [object Object]
            if (typeof message === 'object') {
                try { message = JSON.stringify(message); } catch(e) { message = String(message); }
            }
            line.innerText = message;
            terminal.appendChild(line);
            terminal.scrollTop = terminal.scrollHeight; // Auto-scroll to bottom
        }

        const origLog = console.log, origWarn = console.warn, origError = console.error;
        
        console.log = function(...args) { 
            origLog(...args); 
            printToScreen(args.join(' '), 'eni-log'); 
        };
        console.warn = function(...args) { 
            origWarn(...args); 
            printToScreen(args.join(' '), 'eni-warn'); 
        };
        console.error = function(...args) { 
            origError(...args); 
            printToScreen(args.join(' '), 'eni-error'); 
        };

        console.log("[ENI] Visual terminal initialized. Awaiting engine boot...");

        // 2. The IndexedDB Wiretap
        const originalIDBOpen = window.indexedDB.open;
        window.indexedDB.open = function(name, version) {
            console.log(`[ENI-IDB] Requesting Database: '${name}'`);
            const request = originalIDBOpen.apply(this, arguments);

            request.addEventListener('error', function(event) {
                console.error(`[ENI-FATAL] Database error on '${name}':`, event.target.error);
            });
            request.addEventListener('blocked', function(event) {
                console.warn(`[ENI-WARNING] Database '${name}' is BLOCKED.`);
            });
            request.addEventListener('success', function(event) {
                console.log(`[ENI-IDB] Connected to '${name}' successfully.`);
            });
            return request;
        };

        window.addEventListener("unhandledrejection", function(event) {
            console.error("[ENI-PROMISE] Unhandled Rejection:", event.reason);
        });
        window.addEventListener("error", function(event) {
            console.error(`[ENI-ERROR] ->`, event.error || event.message);
        });
    </script>
