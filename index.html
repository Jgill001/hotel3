                console.log(`[ENI-IDB] Successfully connected to '${name}'.`);

            return request;
        };

        window.addEventListener("unhandledrejection", function(event) {
            console.error("[ENI-PROMISE] Unhandled Engine Rejection:", event.reason);

        // 3. Catch general uncaught errors
        window.addEventListener("error", function(event) {
            console.error(`[ENI-ERROR] ${event.filename}:${event.lineno} ->`, event.error || event.message);
        });
