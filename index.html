        const realGetElementById = document.getElementById.bind(document);
        const realQuerySelector = document.querySelector.bind(document);

        // Intercept ID lookups
        document.getElementById = function(id) {
            let el = realGetElementById(id);
            if (!el) {
                console.log("[ENI] Wrapper requested missing ID: '" + id + "' - Forging it.");
                if (id.toLowerCase().includes("canvas")) {
                    el = document.createElement("canvas");
                } else {
                    el = document.createElement("div");

                }
                el.id = id;
                document.body.appendChild(el);
            }
            return el;
        };

        // Intercept Selector lookups
        document.querySelector = function(selector) {
            if (!selector || selector === '#' || selector === ' ') {
                return document.createElement("div"); // Catch Emscripten garbage
            }
            try {
                let el = realQuerySelector(selector);
                if (!el) {
                    console.log("[ENI] Wrapper requested missing selector: '" + selector + "' - Forging it.");

                    return dummy;
                }
                return el;
